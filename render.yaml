services:
  - type: web
    name: personal-ai-chat-backend
    env: node
    buildCommand: npm install
    startCommand: node src/server.js
    plan: free
    healthCheckPath: /api/ping
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: FRONTEND_URL
        sync: false   # Set to your Vercel frontend URL after deploying frontend
      - key: MONGO_URI
        sync: false   # Paste your MongoDB Atlas connection string
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: COHERE_API_KEY
        sync: false
      - key: MISTRAL_API_KEY
        sync: false
      - key: HUGGINGFACE_API_KEY
        sync: false   # FIX: was missing from the original render.yaml
      - key: TAVILY_API_KEY
        sync: false
